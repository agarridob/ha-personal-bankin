refresh_accounts:
  name: Refresh Accounts
  description: Refresh the list of linked bank accounts from Enable Banking.

refresh_transactions:
  name: Refresh Transactions
  description: Fetch latest transactions for all linked accounts.
  fields:
    days:
      name: Days
      description: Number of days to fetch (default 30).
      required: false
      default: 30
      selector:
        number:
          min: 1
          max: 365
          mode: box

get_balance:
  name: Get Balance
  description: Get current balances for all linked accounts.

get_monthly_summary:
  name: Get Monthly Summary
  description: Get spending summary grouped by category for a given month.
  fields:
    month:
      name: Month
      description: Month number (1-12). Defaults to current month.
      required: false
      selector:
        number:
          min: 1
          max: 12
          mode: box
    year:
      name: Year
      description: Year. Defaults to current year.
      required: false
      selector:
        number:
          min: 2020
          max: 2030
          mode: box

categorize_transactions:
  name: Categorize Transactions
  description: Re-run auto-categorization on all cached transactions.

add_categorization_rule:
  name: Add Categorization Rule
  description: >-
    Add a custom keyword for a spending category. The keyword is stored
    persistently, merged with the built-in rules, and all cached
    transactions are re-categorized immediately. Matching is a
    case-insensitive substring check.
  fields:
    category:
      name: Category
      description: The spending category the keyword maps to.
      required: true
      selector:
        select:
          custom_value: true
          options:
            - housing
            - food
            - transport
            - insurance
            - subscriptions
            - loans
            - utilities
            - income
            - transfers
            - other
    keyword:
      name: Keyword
      description: Text to match in the transaction (merchant name, concept...).
      required: true
      selector:
        text:

remove_categorization_rule:
  name: Remove Categorization Rule
  description: >-
    Remove a previously added custom keyword. Built-in rules are not
    affected. Cached transactions are re-categorized immediately.
  fields:
    category:
      name: Category
      description: The spending category the keyword belongs to.
      required: true
      selector:
        select:
          custom_value: true
          options:
            - housing
            - food
            - transport
            - insurance
            - subscriptions
            - loans
            - utilities
            - income
            - transfers
            - other
    keyword:
      name: Keyword
      description: The exact custom keyword to remove.
      required: true
      selector:
        text:

set_budget_limit:
  name: Set Budget Limit
  description: Set a monthly budget limit for a spending category.
  fields:
    category:
      name: Category
      description: The spending category (e.g., housing, food, transport).
      required: true
      selector:
        text:
    limit:
      name: Limit
      description: Monthly budget limit in EUR.
      required: true
      selector:
        number:
          min: 0
          max: 100000
          step: 0.01
          mode: box

fetch_full_history:
  name: Fetch Full History
  description: >-
    Admin-only. Resets the backfill flag and fetches 12 months (365 days) of
    transaction history for all linked accounts. Use this after adding a new
    bank account or to rebuild historical data from scratch.
    Counts as one Enable Banking API call per account (4/day limit).

toggle_demo:
  name: Toggle Demo Mode
  description: Toggle demo mode on/off. Generates realistic synthetic banking data for testing and demonstration.

export_csv:
  name: Export CSV
  description: Export transactions as a CSV file for local download.
  fields:
    date_from:
      name: From Date
      description: Start date filter (YYYY-MM-DD). Optional.
      required: false
      selector:
        date:
    date_to:
      name: To Date
      description: End date filter (YYYY-MM-DD). Optional.
      required: false
      selector:
        date:
